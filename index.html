<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medication Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- MED-23: floating action button, replacing the old top-center
       add-medication bar/trigger. Bare "+" glyph + aria-label mirrors the
       app's existing bare-glyph-plus-aria-label pattern already used by
       .close-dialog-btn ("×" + aria-label="Close"). Positioned in the DOM
       right after the header (same spot the old trigger occupied) so tab
       order is unaffected by its `position: fixed` styling. -->
  <button id="add-medication-fab" type="button" class="add-medication-fab" aria-label="Add medication">
    +
  </button>

  <main>
    <dialog id="add-medication-dialog" class="app-dialog" aria-labelledby="add-medication-dialog-title">
      <form id="add-medication-form" novalidate>
        <div class="dialog-header">
          <h2 id="add-medication-dialog-title">Add medication</h2>
          <button type="button" id="close-dialog-btn" class="close-dialog-btn" aria-label="Close">
            &times;
          </button>
        </div>
        <div class="form-row">
          <label for="med-name">Name</label>
          <input id="med-name" name="name" type="text" autocomplete="off" autofocus required />
        </div>
        <div class="form-row">
          <label for="med-dose">Dose</label>
          <input id="med-dose" name="dose" type="text" autocomplete="off" placeholder="e.g. 500mg" required />
        </div>
        <div class="form-row">
          <label for="med-interval">Interval (hours)</label>
          <input id="med-interval" name="intervalHours" type="number" step="any" inputmode="decimal" required />
        </div>
        <p id="form-error" class="form-error" role="alert"></p>
        <div class="dialog-actions">
          <button type="button" id="cancel-add-btn">Cancel</button>
          <button type="submit">Add medication</button>
        </div>
      </form>
    </dialog>

    <!-- MED-17: a single, separate dialog (not a shared Add/Edit dialog)
         reused across rows -- whichever row's Edit control is activated
         populates it with that row's current Name/Dose/Interval via app.js,
         mirroring how the Add dialog above is one element reused for every
         add. MED-32 moved the Interval field in here (previously a per-card
         inline input, MED-5). MED-32 also added a "Revert to Active" control
         here, which MED-34 removed again — tapping a Cooldown card now does
         the same job (see js/app.js's handleCardTap). -->
    <dialog id="edit-medication-dialog" class="app-dialog" aria-labelledby="edit-medication-dialog-title">
      <form id="edit-medication-form" novalidate>
        <div class="dialog-header">
          <h2 id="edit-medication-dialog-title">Edit medication</h2>
          <button type="button" id="close-edit-dialog-btn" class="close-dialog-btn" aria-label="Close">
            &times;
          </button>
        </div>
        <div class="form-row">
          <label for="med-edit-name">Name</label>
          <input id="med-edit-name" name="name" type="text" autocomplete="off" autofocus required />
        </div>
        <div class="form-row">
          <label for="med-edit-dose">Dose</label>
          <input id="med-edit-dose" name="dose" type="text" autocomplete="off" placeholder="e.g. 500mg" required />
        </div>
        <div class="form-row">
          <label for="med-edit-interval">Interval (hours)</label>
          <input id="med-edit-interval" name="intervalHours" type="number" step="any" inputmode="decimal" required />
        </div>
        <p id="edit-form-error" class="form-error" role="alert"></p>
        <div class="dialog-actions">
          <button type="button" id="cancel-edit-btn">Cancel</button>
          <button type="submit">Save changes</button>
        </div>
      </form>
    </dialog>

    <section aria-labelledby="medication-list-heading">
      <!-- Seeded with the section's original static heading text so the
           heading (and the section it labels) always has an accessible
           name — before JS runs, or if it fails/is disabled. js/app.js
           overwrites this with today's date on load. -->
      <h1 id="medication-list-heading">Your medications</h1>
      <p id="empty-state">No medications yet — add one to get started.</p>
      <ul id="medication-list" class="medication-list" hidden></ul>
    </section>
  </main>

  <!-- Visually-hidden live region announcing successful actions (e.g. a
       logged dose) to screen readers; errors already have their own
       visible, per-row role="alert" elements so they don't need this. -->
  <p id="status-announcer" class="visually-hidden" role="status" aria-live="polite"></p>

  <script type="module" src="js/app.js"></script>
</body>
</html>
